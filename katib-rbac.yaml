apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pipeline-katib-role
  namespace: kubeflow
rules:
- apiGroups: ["kubeflow.org"]
  resources: ["experiments"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-katib-rolebinding
  namespace: kubeflow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pipeline-katib-role
subjects:
- kind: ServiceAccount
  name: pipeline-runner
  namespace: kubeflow
